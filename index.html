<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Контроль веса</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1e1e24;
            --text-color: #eeeeee;
            --accent-color: #6c5ce7;
            --error-color: #ff7675;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 { text-align: center; }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2a2a32;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .error { color: var(--error-color); font-size: 0.85em; margin-top: 5px; display: none; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: left; }

        #stats-section { display: none; }
        canvas { max-width: 100%; }
        .reset-btn { background-color: #d63031; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Контроль веса</h1>

    <div class="card">
        <div class="form-group">
            <label>Вес (кг)</label>
            <input type="number" id="weightInput" step="0.1" placeholder="70.5">
            <div id="weightError" class="error">Введите число от 20 до 300</div>
        </div>
        <div class="form-group">
            <label>Дата</label>
            <input type="date" id="dateInput">
        </div>
        <button id="saveBtn">Сохранить вес</button>
    </div>

    <button id="toggleStatsBtn">Показать статистику</button>

    <div id="stats-section">
        <div class="card">
            <h3>График</h3>
            <canvas id="weightChart"></canvas>
        </div>
        <div class="card">
            <h3>Таблица</h3>
            <div id="tableContainer"></div>
        </div>
        <button class="reset-btn" id="resetBtn">Сбросить все данные</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const weightInput = document.getElementById('weightInput');
    const dateInput = document.getElementById('dateInput');
    const saveBtn = document.getElementById('saveBtn');
    const toggleStatsBtn = document.getElementById('toggleStatsBtn');
    const statsSection = document.getElementById('stats-section');
    const weightError = document.getElementById('weightError');
    const resetBtn = document.getElementById('resetBtn');

    dateInput.valueAsDate = new Date();

    let chartInstance = null;

    function getStorage() {
        return JSON.parse(localStorage.getItem('weightLog') || '[]');
    }

    function saveStorage(data) {
        localStorage.setItem('weightLog', JSON.stringify(data.sort((a, b) => new Date(a.date) - new Date(b.date))));
    }

    saveBtn.addEventListener('click', () => {
        const weight = parseFloat(weightInput.value);
        const date = dateInput.value;

        if (isNaN(weight) || weight < 20 || weight > 300) {
            weightError.style.display = 'block';
            return;
        }
        weightError.style.display = 'none';

        let data = getStorage();
        const existingIndex = data.findIndex(item => item.date === date);

        if (existingIndex !== -1) {
            if (!confirm('Перезаписать вес за эту дату?')) return;
            data[existingIndex].weight = weight;
        } else {
            data.push({ date, weight });
        }

        saveStorage(data);
        alert('Сохранено!');
        if (statsSection.style.display === 'block') updateStats();
    });

    function updateStats() {
        const data = getStorage();
        if (data.length === 0) {
            statsSection.innerHTML = '<p>Нет данных. Добавьте свой первый вес!</p>';
            return;
        }

        // Table
        let html = '<table><tr><th>Дата</th><th>Вес (кг)</th></tr>';
        data.forEach(item => {
            html += `<tr><td>${item.date}</td><td>${item.weight}</td></tr>`;
        });
        html += '</table>';
        document.getElementById('tableContainer').innerHTML = html;

        // Chart
        const ctx = document.getElementById('weightChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d.date),
                datasets: [{
                    label: 'Вес (кг)',
                    data: data.map(d => d.weight),
                    borderColor: '#6c5ce7',
                    tension: 0.1
                }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: false } } }
        });
    }

    toggleStatsBtn.addEventListener('click', () => {
        const isVisible = statsSection.style.display === 'block';
        statsSection.style.display = isVisible ? 'none' : 'block';
        toggleStatsBtn.innerText = isVisible ? 'Показать статистику' : 'Скрыть статистику';
        if (!isVisible) updateStats();
    });

    resetBtn.addEventListener('click', () => {
        if (confirm('Удалить все данные?')) {
            localStorage.removeItem('weightLog');
            location.reload();
        }
    });
</script>

</body>
</html>
