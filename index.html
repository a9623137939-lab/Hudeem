<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Контроль веса — Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f0f12;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #eeeeee;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }
        .app-container { max-width: 600px; margin: 0 auto; }
        .card {
            background-color: #1e1e24;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff, #b9b3ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #a0a0b0;
            font-size: 14px;
            margin-bottom: 24px;
            border-left: 3px solid #6c5ce7;
            padding-left: 12px;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #cdcddf;
        }
        input, select {
            width: 100%;
            background-color: #2c2c34;
            border: 1px solid #3a3a44;
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 16px;
            color: #ffffff;
            outline: none;
        }
        input:focus, select:focus { border-color: #6c5ce7; box-shadow: 0 0 0 2px rgba(108,92,231,0.3); }
        .error-msg { color: #ff6b6b; font-size: 13px; margin-top: 6px; padding-left: 8px; }
        .btn-group, .flex-buttons { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
        button {
            background-color: #2c2c34;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            color: #eeeeee;
            cursor: pointer;
            flex: 1 0 auto;
        }
        .btn-primary { background-color: #6c5ce7; color: white; box-shadow: 0 2px 6px rgba(108,92,231,0.3); }
        .btn-primary:hover { background-color: #5f4fdb; transform: scale(0.98); }
        .btn-secondary { background-color: #2c2c34; border: 1px solid #4a4a56; }
        .btn-secondary:hover { background-color: #3a3a44; }
        .btn-danger { background-color: #3a2a2f; border: 1px solid #8a4a5a; color: #ffaaaa; }
        .stats-container {
            background-color: #1e1e24;
            border-radius: 24px;
            padding: 20px;
            margin-top: 8px;
        }
        .stats-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .no-data-message {
            background-color: #2a2a32;
            border-radius: 20px;
            padding: 32px 20px;
            text-align: center;
            color: #aaaaaa;
        }
        .weight-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; border-radius: 18px; overflow: hidden; }
        .weight-table th, .weight-table td { text-align: left; padding: 12px; border-bottom: 1px solid #2e2e38; }
        .weight-table th { background-color: #2a2a32; color: #cbcbff; }
        .chart-container { margin-top: 12px; height: 280px; width: 100%; }
        hr { border-color: #2e2e38; margin: 16px 0; }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background-color: rgba(44,44,52,0.95);
            border-left: 4px solid #6c5ce7;
            border-radius: 60px;
            padding: 12px 24px;
            color: #f0f0f0;
            font-weight: 500;
            font-size: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        @media (max-width: 500px) {
            .toast-notification { white-space: normal; text-align: center; max-width: 85%; border-radius: 28px; }
            body { padding: 16px 12px 32px; }
            button { padding: 10px 14px; }
        }
        /* Сворачиваемый блок */
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 8px 0;
        }
        .collapsible-header .title {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .arrow {
            font-size: 24px;
            transition: transform 0.2s ease;
            user-select: none;
        }
        .arrow.up {
            transform: rotate(180deg);
        }
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            margin-top: 0;
        }
        .collapsible-content.show {
            max-height: 800px;
            transition: max-height 0.4s ease-in;
            margin-top: 20px;
        }
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .settings-row label { margin-bottom: 0; }
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3a3a44; transition: 0.2s; border-radius: 26px;
        }
        .slider:before {
            position: absolute; content: ""; height: 22px; width: 22px; left: 2px; bottom: 2px;
            background-color: white; transition: 0.2s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #6c5ce7; }
        input:checked + .slider:before { transform: translateX(26px); }
        .time-select, .weekday-select {
            background-color: #2c2c34;
            border-radius: 16px;
            padding: 10px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="card">
        <h1>⚖️ Контроль веса</h1>
        <div class="sub">Записывайте прогресс — стройте график</div>
        <div class="form-group">
            <label>📆 Дата</label>
            <input type="date" id="dateInput">
        </div>
        <div class="form-group">
            <label>⚡ Вес (кг)</label>
            <input type="number" id="weightInput" step="0.1" placeholder="например, 72.5">
            <div id="weightError" class="error-msg"></div>
        </div>
        <div class="btn-group">
            <button id="saveBtn" class="btn-primary">💾 Сохранить вес</button>
        </div>
    </div>

    <!-- Сворачиваемый блок настроек уведомлений -->
    <div class="card">
        <div class="collapsible-header" id="notifHeader">
            <div class="title">
                <span>🔔</span> Настройка уведомлений
            </div>
            <span class="arrow" id="headerArrow">▼</span>
        </div>
        <div class="collapsible-content" id="notifContent">
            <div class="settings-row">
                <span>Ежедневное напоминание</span>
                <label class="switch">
                    <input type="checkbox" id="dailyEnabled">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="settings-row">
                <label>Время отправки</label>
                <input type="time" id="dailyTime" value="19:00" class="time-select">
            </div>
            <div class="settings-row">
                <span>Еженедельная сводка</span>
                <label class="switch">
                    <input type="checkbox" id="weeklyEnabled">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="settings-row">
                <label>День недели</label>
                <select id="weeklyDay" class="weekday-select">
                    <option value="0">Понедельник</option><option value="1">Вторник</option><option value="2">Среда</option>
                    <option value="3">Четверг</option><option value="4">Пятница</option><option value="5">Суббота</option>
                    <option value="6">Воскресенье</option>
                </select>
            </div>
            <div class="settings-row">
                <label>Время сводки</label>
                <input type="time" id="weeklyTime" value="19:00" class="time-select">
            </div>
            <button id="saveSettingsBtn" class="btn-secondary">💾 Сохранить настройки</button>
        </div>
    </div>

    <div class="flex-buttons">
        <button id="showStatsBtn" class="btn-secondary">📊 Показать статистику</button>
        <button id="resetDataBtn" class="btn-danger">🗑️ Сбросить все данные</button>
    </div>

    <div id="statsBlock" class="stats-container" style="display: none;">
        <div class="stats-title">📈 История и график</div>
        <div id="statsContent"></div>
    </div>
</div>

<script>
    // ---------- Конфигурация ----------
    const BACKEND_URL = "https://a9623137939-lab.github.io/Hudeem/"; // замените на адрес вашего бота
    const STORAGE_KEY = "weightLog";
    const NOTIF_KEY = "notifSettings";

    let weightChart = null;
    let currentWeightLog = [];
    let notifSettings = { dailyEnabled: false, dailyTime: "19:00", weeklyEnabled: false, weeklyDay: 6, weeklyTime: "19:00" };

    // DOM элементы
    const dateInput = document.getElementById('dateInput');
    const weightInput = document.getElementById('weightInput');
    const weightErrorDiv = document.getElementById('weightError');
    const saveBtn = document.getElementById('saveBtn');
    const showStatsBtn = document.getElementById('showStatsBtn');
    const resetDataBtn = document.getElementById('resetDataBtn');
    const statsBlock = document.getElementById('statsBlock');
    const statsContent = document.getElementById('statsContent');
    const dailyEnabledChk = document.getElementById('dailyEnabled');
    const dailyTimeInput = document.getElementById('dailyTime');
    const weeklyEnabledChk = document.getElementById('weeklyEnabled');
    const weeklyDaySelect = document.getElementById('weeklyDay');
    const weeklyTimeInput = document.getElementById('weeklyTime');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');

    // Элементы сворачивания
    const notifHeader = document.getElementById('notifHeader');
    const notifContent = document.getElementById('notifContent');
    const headerArrow = document.getElementById('headerArrow');

    let isExpanded = false;

    function toggleNotifications() {
        isExpanded = !isExpanded;
        if (isExpanded) {
            notifContent.classList.add('show');
            headerArrow.classList.add('up');
        } else {
            notifContent.classList.remove('show');
            headerArrow.classList.remove('up');
        }
    }

    notifHeader.addEventListener('click', toggleNotifications);

    // ---------- Вспомогательные функции ----------
    function getTodayDate() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }
    function setDefaultDate() { dateInput.value = getTodayDate(); }
    function showToast(message, duration = 2200) {
        const existing = document.querySelector('.toast-notification');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '1'; toast.style.transform = 'translateX(-50%) scale(1)'; }, 10);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) scale(0.9)';
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 200);
        }, duration);
    }
    function clearError() { weightErrorDiv.innerText = ''; }
    function showWeightError(msg) { weightErrorDiv.innerText = msg; }
    function isValidWeight(w) { return !isNaN(w) && w >= 20 && w <= 300; }

    // CloudStorage
    function loadFromCloud(key, callback) {
        if (!window.Telegram?.WebApp?.CloudStorage) return callback(null);
        Telegram.WebApp.CloudStorage.getItem(key, (err, val) => {
            if (err || !val) callback(null);
            else try { callback(JSON.parse(val)); } catch(e) { callback(null); }
        });
    }
    function saveToCloud(key, data, callback) {
        if (!window.Telegram?.WebApp?.CloudStorage) return callback?.(false);
        Telegram.WebApp.CloudStorage.setItem(key, JSON.stringify(data), (err) => callback?.(!err));
    }

    // Загрузка весов и настроек
    function loadAllData() {
        loadFromCloud(STORAGE_KEY, (log) => { if (log) currentWeightLog = log; });
        loadFromCloud(NOTIF_KEY, (settings) => {
            if (settings) {
                notifSettings = settings;
                dailyEnabledChk.checked = notifSettings.dailyEnabled || false;
                dailyTimeInput.value = notifSettings.dailyTime || "19:00";
                weeklyEnabledChk.checked = notifSettings.weeklyEnabled || false;
                weeklyDaySelect.value = notifSettings.weeklyDay ?? 6;
                weeklyTimeInput.value = notifSettings.weeklyTime || "19:00";
            }
        });
    }

    // Сохранение веса + синхронизация
    function addOrUpdateWeight(date, weight) {
        let log = [...currentWeightLog];
        const idx = log.findIndex(e => e.date === date);
        if (idx !== -1) {
            if (!confirm(`Запись за ${date} уже существует (${log[idx].weight} кг). Перезаписать?`)) return false;
            log[idx].weight = weight;
        } else {
            log.push({ date, weight });
        }
        saveToCloud(STORAGE_KEY, log, (ok) => {
            if (ok) {
                currentWeightLog = log;
                showToast("🎉 Вес сохранён!");
                refreshStatisticsIfVisible();
                syncToBackend({ type: 'weight', date, weight });
            } else showToast("Ошибка сохранения");
        });
        return true;
    }

    // Сохранение настроек + синхронизация
    function saveNotificationSettings() {
        notifSettings = {
            dailyEnabled: dailyEnabledChk.checked,
            dailyTime: dailyTimeInput.value,
            weeklyEnabled: weeklyEnabledChk.checked,
            weeklyDay: parseInt(weeklyDaySelect.value),
            weeklyTime: weeklyTimeInput.value
        };
        saveToCloud(NOTIF_KEY, notifSettings, (ok) => {
            if (ok) {
                showToast("Настройки уведомлений сохранены");
                syncToBackend({ type: 'settings', settings: notifSettings });
            } else showToast("Ошибка сохранения настроек");
        });
    }

    // Отправка данных на сервер бота
    async function syncToBackend(payload) {
        if (!BACKEND_URL || BACKEND_URL === "https://a9623137939-lab.github.io/Hudeem/") return;
        const tg = window.Telegram?.WebApp;
        const chatId = tg?.initDataUnsafe?.user?.id;
        if (!chatId) return;
        const fullPayload = { chat_id: chatId, ...payload };
        try {
            await fetch(`${BACKEND_URL}/sync`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(fullPayload)
            });
        } catch(e) { console.warn("Sync error", e); }
    }

    function refreshStatisticsIfVisible() {
        if (statsBlock.style.display !== 'none') renderStatistics();
    }
    function renderStatistics() {
        const sorted = [...currentWeightLog].sort((a,b)=>a.date.localeCompare(b.date));
        if (sorted.length === 0) {
            statsContent.innerHTML = `<div class="no-data-message">📭 Нет данных. Добавьте первый вес!</div>`;
            if (weightChart) { weightChart.destroy(); weightChart = null; }
            return;
        }
        let html = `<table class="weight-table"><thead><tr><th>📅 Дата</th><th>⚖️ Вес (кг)</th></tr></thead><tbody>`;
        sorted.forEach(e => html += `<tr><td>${e.date}</td><td>${parseFloat(e.weight).toFixed(1)} кг</td></tr>`);
        html += `</tbody></table><div class="chart-container"><canvas id="weightChartCanvas"></canvas></div>`;
        statsContent.innerHTML = html;
        const ctx = document.getElementById('weightChartCanvas').getContext('2d');
        if (weightChart) weightChart.destroy();
        weightChart = new Chart(ctx, {
            type: 'line',
            data: { labels: sorted.map(e=>e.date), datasets: [{ label:'Вес (кг)', data: sorted.map(e=>e.weight), borderColor:'#6c5ce7', backgroundColor:'rgba(108,92,231,0.05)', borderWidth:3, pointRadius:4, tension:0.2, fill:true }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color:'#eee' } } }, scales: { x: { ticks: { color:'#ccc' } }, y: { ticks: { color:'#ccc' }, min: 70 } } }
        });
    }

    function resetAllData() {
        if (!confirm("Удалить все записи о весе?")) return;
        saveToCloud(STORAGE_KEY, [], (ok) => {
            if (ok) {
                currentWeightLog = [];
                showToast("Все данные удалены");
                refreshStatisticsIfVisible();
                syncToBackend({ type: 'reset' });
            }
        });
    }

    function handleSaveWeight() {
        clearError();
        let raw = weightInput.value.trim();
        if (raw === "") { showWeightError("Введите вес"); return; }
        raw = raw.replace(',', '.');
        const w = parseFloat(raw);
        if (!isValidWeight(w)) { showWeightError("Вес от 20 до 300 кг"); return; }
        const date = dateInput.value;
        if (!date) { showWeightError("Выберите дату"); return; }
        if (addOrUpdateWeight(date, w)) {
            weightInput.value = '';
            setDefaultDate();
        }
    }

    function handleShowStats() {
        statsBlock.style.display = 'block';
        renderStatistics();
    }

    function init() {
        setDefaultDate();
        saveBtn.onclick = handleSaveWeight;
        showStatsBtn.onclick = handleShowStats;
        resetDataBtn.onclick = resetAllData;
        saveSettingsBtn.onclick = saveNotificationSettings;
        weightInput.oninput = clearError;
        weightInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSaveWeight(); });
        if (window.Telegram?.WebApp) {
            const tg = Telegram.WebApp;
            tg.expand();
            tg.enableClosingConfirmation();
            tg.setHeaderColor('#0f0f12');
            tg.setBackgroundColor('#0f0f12');
        }
        loadAllData();
        // Блок свёрнут по умолчанию
        isExpanded = false;
        notifContent.classList.remove('show');
        headerArrow.classList.remove('up');
    }
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
